name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish GitHub Release
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0  # v6.0.7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          expected="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$expected" ]; then
            echo "Tag $TAG does not match package.json version $expected" >&2
            exit 1
          fi

      - name: Build Chrome zip
        run: pnpm zip

      - name: Generate release notes
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          pnpm exec git-cliff --tag "$TAG" --unreleased --strip header --output .release-notes.md
          cat .release-notes.md

      - name: Create GitHub release with Chrome zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          zip_path=".output/tabsquad-${TAG#v}-chrome.zip"
          if [ ! -f "$zip_path" ]; then
            echo "Expected zip at $zip_path was not produced." >&2
            exit 1
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes-file .release-notes.md \
            "$zip_path"
