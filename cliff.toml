# git-cliff configuration for TabSquad
# Keep a Changelog-style sections, populated from traditional-style commit subjects.

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/).
While on `0.x.y`, the minor version bumps for new features and the patch
version bumps for fixes; once `1.0.0` ships we will revisit and likely
adopt strict [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """

{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{%- else -%}
## [Unreleased]
{%- endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\\n") | first | trim }}
{%- endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9]*"
sort_commits = "oldest"

# Category rules applied to the commit subject's leading verb.
# Order matters: the first matching pattern wins.
#
# Supports both this repo's traditional-style subjects ("Add foo",
# "Fix bar") and Conventional Commits subjects ("feat: foo",
# "fix(scope)!: bar") that may arrive via outside contributors.
commit_parsers = [
  # Skip commits that are not user-visible.
  { message = "^Initial commit\\b", skip = true },
  { message = "^Merge\\b", skip = true },
  { message = "^Revert\\b", skip = true },
  { message = "\\[ci skip\\]", skip = true },
  { message = "(?i)\\b(CI|GitHub Actions?|workflows?|Dependabot|Renovate|Harden-?Runner|pre-?commit|lint(er|ing)?|format(ter|ting)?|prettier|eslint|rubocop|zizmor|actionlint)\\b", skip = true },
  { message = "(?i)\\b(README|docs?|documentation|comment|changelog|license|privacy policy|listing copy)\\b", skip = true },
  { message = "^(Refactor|Rework|Reformat|Clean ?up|Reorganize|Rename|Move|Format|Tidy|Tweak|Polish|Simplify|Inline|Extract|Restructure|Factor)\\b", skip = true },
  { message = "^(Test|Tests)\\b", skip = true },

  # Dependency-bot commits are skipped by author.
  { field = "author.name", pattern = "(?i)(dependabot|renovate)(\\[bot\\])?$", skip = true },
  { field = "author.email", pattern = "(?i)@(dependabot|renovate)\\b", skip = true },
  { field = "author.email", pattern = "^[0-9]+\\+(dependabot|renovate)(\\[bot\\])?@", skip = true },

  # Subjects that look like dependency-bot output even when authored
  # by a human (e.g. a manual cherry-pick of a bot PR).
  { message = "^Bump\\b", skip = true },
  { message = "^Update dependency\\b", skip = true },

  # Conventional Commits types that aren't user-visible.
  { message = "^(chore|ci|build|docs?|test|tests|style|refactor|perf|revert)(\\(.+?\\))?!?:", skip = true },
  { body = "(?im)^chore\\b", skip = true },

  # Conventional Commits: user-visible types.
  { message = "^feat(\\(.+?\\))?!?:", group = "Added" },
  { message = "^fix(\\(.+?\\))?!?:", group = "Fixed" },
  { message = "^remove(\\(.+?\\))?!?:", group = "Removed" },
  { message = "^deprecate(\\(.+?\\))?!?:", group = "Deprecated" },
  { message = "^(security|sec)(\\(.+?\\))?!?:", group = "Security" },

  # Traditional style: user-visible categories.
  { message = "^(Add|Introduce|Implement|Support|Allow|Enable|Expose|Show|Define|Install|Include)\\b", group = "Added" },
  { message = "^(Fix|Correct|Repair|Resolve|Prevent|Avoid|Stop|Guard|Handle|Rescue|Protect|Properly|Stabilize)\\b", group = "Fixed" },
  { message = "^(Remove|Drop|Delete|Retire|Disable|Exclude|Omit|Skip|Ignore|Turn off)\\b", group = "Removed" },
  { message = "^Deprecate\\b", group = "Deprecated" },
  { message = "^(Secure|Harden|Sanitize)\\b", group = "Security" },

  # Everything else that is still user-visible falls under Changed.
  # This catches Update, Upgrade, Use, Replace, Switch, Make, Improve,
  # Enhance, Migrate, Adapt, Adjust, Set, Default, and any verb not
  # otherwise classified.
  { message = ".*", group = "Changed" },
]
